# VeritasCarbon Configuration File
# All main experiments use local open-source models only.
# GPT-4 is used ONLY in Section 4.7 (LLM-as-Judge), never for data generation.

# Model Configuration
model:
  base_model_name: "Qwen/Qwen2-72B-Instruct"  # Local 4-bit quantized model
  max_length: 2048
  use_qlora: true
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.1

# Data Configuration
data:
  raw_corpus_path: "data/raw_corpus"
  processed_corpus_path: "data/processed_corpus"
  instruction_datasets_path: "data/instruction_datasets"
  evaluation_benchmark_path: "data/evaluation_benchmark"
  
  chunk_size: 512
  chunk_overlap: 50
  min_chunk_length: 100
  convert_traditional: true
  chinese_only: true
  min_chinese_ratio: 0.60
  chunk_simhash_threshold: 3

# CoDE Framework Configuration
# NOTE: All CoDE generation uses the LOCAL model specified above.
# No external API is used for instruction generation.
coe:
  max_iterations: 2
  temperature: 0.7
  max_tokens: 2048
  
  use_adaptive_selection: true
  use_layered_selection: true
  expert_selection_model: "bert-base-chinese"
  min_experts: 1
  max_experts: 3
  
  layered_selection:
    base_layer_required: true
    analysis_layer_threshold: 0.3
    verification_layer_threshold: 0.3
    graph_layer_threshold: 0.5
  
  enable_collaboration: true
  collaboration_mode: "sequential"
  
  use_domain_knowledge: true
  knowledge_base_path: "data/knowledge_base"
  max_knowledge_items: 5
  
  use_meta_expert: true
  carbon_centric: true
  enable_advanced_experts: true

# Training Configuration
training:
  output_dir: "models/finetuned"
  num_train_epochs: 3
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 2e-4
  warmup_steps: 100
  logging_steps: 10
  save_steps: 500
  evaluation_strategy: "steps"
  eval_steps: 500

# Evaluation Configuration
evaluation:
  metrics: ["rouge-l", "bleu", "bertscore", "bleurt", "factcheck"]
  output_path: "results/outputs"
  
  benchmarks:
    esg_qa: "data/evaluation_benchmark/esg_qa_benchmark.jsonl"
    esg_ie: "data/evaluation_benchmark/esg_ie_benchmark.jsonl"
    esg_summary: "data/evaluation_benchmark/esg_summary_benchmark.jsonl"
    esg_classification: "data/evaluation_benchmark/esg_classification_benchmark.jsonl"
  
  human_evaluation:
    sample_size: 500
    num_annotators: 3
    evaluation_dimensions: ["relevance", "accuracy", "fluency", "domain_relevance"]

# Paths
paths:
  base_model_dir: "models/base"
  finetuned_model_dir: "models/finetuned"
  results_dir: "results"
  logs_dir: "results/logs"
